name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: enhancement
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please provide the following information.
  - type: input
    id: summary
    attributes:
      label: Feature Summary
      description: Briefly describe the feature you would like to see.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Detailed Description
      description: Provide a detailed description of the feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
