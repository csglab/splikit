name: Bug Report
description: Report a bug
title: "[BUG] "
labels: bug
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide the following information.
  - type: input
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Describe the steps to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happened.
    validations:
      required: true
