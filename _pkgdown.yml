url: https://arshammik.github.io/splikit/

template:
  bootstrap: 5
  bootswatch: default
  bslib:
    pkgdown-nav-height: 120px
  includes:
    in_header: |
      <style>
      .template-home img[src*="logo.png"] {
        max-height: 180px;
        height: 180px;
      }
      </style>

navbar:
  structure:
    left:  [manual, reference, guides]
    right: [search, github]
  components:
    manual:
      text: Manual
      href: articles/splikit_manual.html
    reference:
      text: Reference
      href: reference/index.html
    guides:
      text: Guides
      menu:
      - text: STARsolo Processing Guide
        href: articles/STARsolo_guide.html

home:
  title: Splikit - Single-Cell RNA Splicing Analysis Toolkit
  description: A toolkit for analyzing single-cell RNA splicing data
  strip_header: true

articles:
- title: Documentation
  navbar: ~
  contents:
  - splikit_manual
  - STARsolo_guide

reference:
- title: Main Functions
  desc: Core functions for splicing analysis
  contents:
  - make_m1
  - make_m2
  - .make_m2_batched
  - .make_m2_fast
  - make_junction_ab
  - make_gene_count
  - make_velo_count
  - make_eventdata_plus

- title: Feature Selection
  desc: Functions for identifying variable splicing events
  contents:
  - find_variable_genes
  - find_variable_events
  - get_rowVar

- title: Analysis Functions
  desc: Additional analysis utilities
  contents:
  - get_pseudo_correlation
  - get_silhouette_mean

- title: Data
  desc: Example datasets
  contents:
  - load_toy_M1_M2_object
  - load_toy_SJ_object
